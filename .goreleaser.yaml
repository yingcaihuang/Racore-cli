version: 2

project_name: racore-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: racore-cli
    main: .
    binary: racore-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

universal_binaries:
  - id: racore-cli
    replace: true

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

nfpms:
  - id: packages
    package_name: racore-cli
    vendor: Racore Cloud
    homepage: https://github.com/yingcaihuang/Racore-cli
    maintainer: Racore Cloud <support@racorecloud.com>
    description: Racore Cloud CDN CLI with MCP protocol support for AI agents
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/racore-cli/LICENSE
      - src: README.md
        dst: /usr/share/doc/racore-cli/README.md

brews:
  - name: racore-cli
    repository:
      owner: yingcaihuang
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/yingcaihuang/Racore-cli
    description: Racore Cloud CDN CLI with MCP protocol support for AI agents
    license: MIT
    skip_upload: auto
    install: |
      bin.install "racore-cli"
    test: |
      system "#{bin}/racore-cli", "--version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  groups:
    - title: "🚀 New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "📦 Dependencies"
      regexp: '^.*?(deps|dep)(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "🔧 Other Changes"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: yingcaihuang
    name: Racore-cli
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Racore CLI v{{.Version}}

    Racore Cloud CDN 管理命令行工具，支持 MCP 协议，可被 AI Agent（Kiro、AWS Q Developer、Claude Desktop）直接调用。

    ---

  footer: |
    ---

    ## 📥 安装方式

    ### macOS / Linux 一键安装
    ```bash
    curl -fsSL https://raw.githubusercontent.com/yingcaihuang/Racore-cli/main/install.sh | bash
    ```

    ### macOS (Homebrew)
    ```bash
    brew tap yingcaihuang/tap
    brew install racore-cli
    ```

    ### Linux (Ubuntu/Debian)
    ```bash
    sudo dpkg -i racore-cli_{{.Version}}_linux_amd64.deb
    ```

    ### Linux (CentOS/RHEL/Fedora)
    ```bash
    sudo rpm -i racore-cli_{{.Version}}_linux_amd64.rpm
    ```

    ### Windows (MSI 安装包)
    下载 `racore-cli_{{.Version}}_windows_amd64.msi`，双击安装。自动添加到系统 PATH，无需手动配置。

    ### Windows (Scoop)
    ```powershell
    scoop bucket add racore https://github.com/yingcaihuang/Racore-cli
    scoop install racore-cli
    ```

    ---

    ## 📦 安装包说明

    | 文件名 | 平台 | 说明 |
    |--------|------|------|
    | `racore-cli_{{.Version}}_darwin_all.tar.gz` | macOS (Intel + Apple Silicon) | Universal 二进制 |
    | `racore-cli_{{.Version}}_linux_amd64.tar.gz` | Linux x86_64 | 压缩包 |
    | `racore-cli_{{.Version}}_linux_arm64.tar.gz` | Linux ARM64 | 压缩包 |
    | `racore-cli_{{.Version}}_linux_amd64.deb` | Ubuntu/Debian x86_64 | 安装到 /usr/local/bin |
    | `racore-cli_{{.Version}}_linux_arm64.deb` | Ubuntu/Debian ARM64 | 安装到 /usr/local/bin |
    | `racore-cli_{{.Version}}_linux_amd64.rpm` | CentOS/RHEL x86_64 | 安装到 /usr/local/bin |
    | `racore-cli_{{.Version}}_linux_arm64.rpm` | CentOS/RHEL ARM64 | 安装到 /usr/local/bin |
    | `racore-cli_{{.Version}}_windows_amd64.zip` | Windows x86_64 | 压缩包 |
    | `racore-cli_{{.Version}}_windows_arm64.zip` | Windows ARM64 | 压缩包 |
    | `racore-cli_{{.Version}}_windows_amd64.msi` | Windows x86_64 | MSI 安装包（自动加 PATH） |
    | `racore-cli_{{.Version}}_windows_arm64.msi` | Windows ARM64 | MSI 安装包（自动加 PATH） |
    | `checksums.txt` | 所有平台 | SHA256 校验和 |

    ---

    ## 🔌 AI Agent 集成 (MCP)

    安装后，在 AI Agent 配置中添加：
    ```json
    {
      "mcpServers": {
        "racore": {
          "command": "racore-cli",
          "args": ["serve"]
        }
      }
    }
    ```

    支持：Kiro、AWS Q Developer、Claude Desktop、VS Code Copilot

    ---

    **完整文档**: https://github.com/yingcaihuang/Racore-cli#readme
